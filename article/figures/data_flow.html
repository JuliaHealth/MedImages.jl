<!DOCTYPE html>
<html>
<head>
<style>
    body { font-family: 'Segoe UI', sans-serif; background: white; padding: 40px; width: 1000px; }
    .flow-container { display: flex; align-items: center; justify-content: center; height: 500px; }
    .input-block { display: flex; flex-direction: column; gap: 10px; }
    .node { 
        border: 2px solid #2c3e50; 
        border-radius: 8px; 
        padding: 15px; 
        width: 180px; 
        text-align: center; 
        background: white;
    }
    .arrow { font-size: 24px; color: #7f8c8d; margin: 0 15px; }
    .ode-box {
        border: 3px dashed #e74c3c;
        border-radius: 15px;
        padding: 30px;
        background: #fdf2f2;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 20px;
    }
    .nn-node {
        background: #3498db;
        color: white;
        border: none;
        font-weight: bold;
        padding: 20px;
        border-radius: 50%;
        width: 100px;
        height: 100px;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .loop-arrow {
        width: 100px;
        height: 50px;
        border: 2px solid #e74c3c;
        border-top: none;
        border-radius: 0 0 50px 50px;
        margin-top: -10px;
    }
</style>
</head>
<body>
    <h2 style="text-align:center; color:#2c3e50;">UDE Dosimetry Data Flow</h2>
    <div class="flow-container">
        <div class="input-block">
            <div class="node" style="background:#ecf0f1;"><b>SPECT Map</b><br>(Activity A<sub>0</sub>)</div>
            <div class="node" style="background:#ecf0f1;"><b>CT Map</b><br>(Density &rho;)</div>
        </div>
        <div class="arrow">➤</div>
        <div class="ode-box">
            <div style="font-weight:bold; color:#c0392b;">ODE Solver (VCABM)</div>
            <div style="display:flex; align-items:center; gap:20px;">
                <div class="node">State: [A(t), D(t)]</div>
                <div class="arrow">➤</div>
                <div class="nn-node">Neural<br>Residual</div>
                <div class="arrow">➤</div>
                <div class="node">Rate: [dA/dt, dD/dt]</div>
            </div>
            <div class="loop-arrow"></div>
            <div style="font-size:12px; color:#e74c3c;">Iterative Integration (0 to 300h)</div>
        </div>
        <div class="arrow">➤</div>
        <div class="node" style="background:#27ae60; color:white; border:none; font-weight:bold;">Final Dose Map<br>(Gy)</div>
    </div>
</body>
</html>
